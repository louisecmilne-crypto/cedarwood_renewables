<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CedarWood Renewables</title>

    <link rel="stylesheet" href="style.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

    <!-- HEADER -->
    <header class="header">

        <div class="logo-container">
            <img src="premium-logo.png"
                 alt="CedarWood Renewables"
                 class="logo">
        </div>

        <nav class="nav">
            <a href="#">HOME</a>
            <a href="#">ABOUT</a>
            <a href="#">SERVICES</a>
            <a href="projects.html">PROJECTS</a>
            <a href="#">CONTACT</a>
        </nav>

        <a href="#" class="header-btn">
            BOOK A SURVEY
        </a>

    </header>

    <!-- HERO -->
    <section class="hero">

        <div class="hero-overlay"></div>

        <div class="hero-container">

            <div class="hero-left">

                <span class="eyebrow">
                    PREMIUM RENEWABLE ENERGY SOLUTIONS
                </span>

                <h1>
                    Premium Energy Solutions,
                    <span>Powering a Greener Future</span>
                </h1>

                <p class="hero-text">
                    Specialist renewable energy solutions for
                    homes and businesses across the UK —
                    expertly installed, built to last.
                </p>

                <a href="#" class="gold-btn">
                    BOOK A SURVEY →
                </a>

            </div>

            <div class="hero-right">

                <div class="hero-image-card">
                    <img src="hero.jpg" alt="Solar Home">
                </div>

            </div>

        </div>
</div>

<div class="hero-sweep">
    <svg viewBox="0 0 1440 220" preserveAspectRatio="none">
        <defs>
            <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#8d6b12"/>
                <stop offset="25%" stop-color="#d4af37"/>
                <stop offset="50%" stop-color="#fff3b0"/>
                <stop offset="75%" stop-color="#d4af37"/>
                <stop offset="100%" stop-color="#8d6b12"/>
            </linearGradient>

            <filter id="goldGlow">
                <feGaussianBlur stdDeviation="6" result="blur"/>
                <feMerge>
                    <feMergeNode in="blur"/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>
            </filter>
        </defs>

        <!-- Glow underneath -->
        <path
            d="M0,140 C220,220 500,70 760,135 C980,190 1200,180 1440,110"
            fill="none"
            stroke="#D4AF37"
            stroke-width="10"
            opacity="0.18"
            filter="url(#goldGlow)"
        />

        <!-- Main luxury line -->
        <path
            d="M0,140 C220,220 500,70 760,135 C980,190 1200,180 1440,110"
            fill="none"
            stroke="url(#goldLine)"
            stroke-width="4"
            stroke-linecap="round"
        />
    </svg>
</div>

</section> 

</body>
</html>
